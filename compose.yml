services:
  chrome-secure:
    image: ghcr.io/captain686/chrome-cdp:latest
    container_name: chrome
    ports:
      - "5900:5900"
      - "9222:9222"
    shm_size: '2gb'
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_ADMIN
    volumes:
      - $PWD/chrome_data:/data/chrome-profile
    user: "1000:1000"
    restart: unless-stopped